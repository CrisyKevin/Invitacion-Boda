<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cris & Kevin</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial, sans-serif;
}

section{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

#inicio{
    cursor:pointer;
}

#videoPantalla{
    display:none;
    background:#000;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
}

#final{
    display:none;
}

</style>
</head>

<body>

<!-- PORTADA -->
<section id="inicio">
    <img src="portada.jpg" alt="Portada">
</section>

<!-- VIDEO -->
<section id="videoPantalla">
    <video id="video" playsinline preload="auto">
        <source src="video.mp4" type="video/mp4">
        Tu navegador no soporta video HTML5.
    </video>
</section>

<!-- IMAGEN FINAL -->
<section id="final">
    <img src="final.jpg" alt="Final">
</section>

<script>

const inicio = document.getElementById("inicio");
const videoPantalla = document.getElementById("videoPantalla");
const video = document.getElementById("video");
const final = document.getElementById("final");

inicio.addEventListener("click", iniciarInvitacion);

function iniciarInvitacion(){

    inicio.style.display = "none";
    videoPantalla.style.display = "block";

    video.load();

    const playPromise = video.play();

    if(playPromise !== undefined){
        playPromise.catch(error => {
            console.error("Error reproduciendo video:", error);

            // Mostrar controles si el navegador bloquea autoplay
            video.controls = true;
        });
    }
}

video.addEventListener("ended", () => {

    videoPantalla.style.display = "none";
    final.style.display = "block";

});

video.addEventListener("error", () => {

    alert("No se pudo cargar el video.");

    console.error(video.error);

});

</script>

</body>
</html>
